<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LogLens{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
        }

        .ll-page {
            max-width: 1140px;
        }

        .ll-brand {
            letter-spacing: 0.04em;
        }

        .ll-subtitle {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .ll-stat-card .card-body {
            padding: 1.25rem 1.5rem;
        }

        .ll-stat-card .card-title {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .ll-stat-card .display-6 {
            font-size: 2.25rem;
            line-height: 1.1;
        }

        .ll-section-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #dee2e6;
        }

        .ll-analytics-card .card-header {
            font-weight: 600;
            padding: 0.75rem 1rem;
        }

        .ll-analytics-card .card-body {
            padding: 1rem;
        }

        .ll-breakdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.55rem 0;
            border-bottom: 1px solid #eef1f4;
        }

        .ll-breakdown-item:last-child {
            border-bottom: none;
        }

        .ll-severity-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 0.85rem;
            border-radius: 0.375rem;
            background-color: #f8f9fa;
            margin-bottom: 0.5rem;
        }

        .ll-severity-row:last-child {
            margin-bottom: 0;
        }

        .ll-severity-count {
            min-width: 2.25rem;
            text-align: center;
            font-weight: 700;
        }

        .path-cell {
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .path-cell code {
            font-size: 0.78rem;
        }

        .ll-log-table thead th {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .ll-log-table tbody td {
            vertical-align: middle;
        }

        .ll-upload-card {
            border: none;
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>
    <div class="container ll-page py-4 py-md-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
